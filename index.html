<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Una experiència interactiva per celebrar dos anys de relació i recórrer una història compartida." />
  <meta name="theme-color" content="#101114" />

  <title>Dos anys triant-nos</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-lockup">
        <p class="eyebrow">18.07 · Dos anys oficials</p>
        <h1>Dos anys triant-nos</h1>
      </div>

      <button id="musicToggle" class="icon-button" type="button" aria-label="Activar música" title="Música">
        <span aria-hidden="true">♪</span>
      </button>
    </header>

    <section class="progress-area" aria-label="Progrés de l'experiència">
      <div class="progress-label">
        <span id="chapterCounter">Capítol 1 de 8</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <main id="chapterContainer" class="chapter-card" tabindex="-1" aria-live="polite">
      <!-- Contingut generat per JavaScript -->
    </main>

    <footer class="app-footer">
      <button id="resetButton" class="ghost-button" type="button">Reiniciar experiència</button>
    </footer>
  </div>

  <audio id="backgroundMusic" preload="none" loop></audio>

  <script src="js/chapters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
