<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Promesa Incumplida</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <p class="eyebrow">08.06.24</p> 
        <h1>Promesa Incumplida</h1>
      </div>

      <button id="musicToggle" class="icon-button" aria-label="Activar música">
        ♪
      </button>
    </header>

    <section class="progress-area">
      <div class="progress-label">
        <span id="chapterCounter">Capítulo 1 de 6</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <main id="chapterContainer" class="chapter-card">
      <!-- Contenido generado por JavaScript -->
    </main>

    <footer class="app-footer">
      <button id="resetButton" class="ghost-button">Reiniciar experiencia</button>
    </footer>

  </div>

  <audio id="backgroundMusic" loop>
    <!-- Más adelante pondremos aquí una canción propia o instrumental -->
  </audio>

  <script src="js/chapters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
